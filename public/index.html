<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Virtual Bingo</title>
<link rel="stylesheet" href="/styles.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Inter:wght@400;600;700&family=Space+Mono&display=swap" rel="stylesheet">
</head>
<body>
  <div class="wrap" style="max-width:640px; padding-top:8vh;">
    <div class="center">
      <div class="ball-stage" style="padding-bottom:6px;">
        <div class="ball" style="animation:none;">75</div>
      </div>
      <h1 style="font-size:38px;">Virtual Bingo</h1>
      <p class="dim mt-16">No installs, no accounts. Works on any phone, anywhere.</p>
    </div>

    <div class="grid-2 mt-24">
      <a href="/admin" style="text-decoration:none;">
        <div class="card center" style="cursor:pointer; height:100%;">
          <span class="eyebrow">Host</span>
          <h3 style="font-size:22px;">I'm the Admin</h3>
          <p class="dim" style="font-size:14px; margin-top:10px;">Create the game, call the numbers, run the show.</p>
        </div>
      </a>
      <a href="/join" style="text-decoration:none;">
        <div class="card center" style="cursor:pointer; height:100%;">
          <span class="eyebrow">Play</span>
          <h3 style="font-size:22px;">I'm a Player</h3>
          <p class="dim" style="font-size:14px; margin-top:10px;">Pick your name and mark your ticket as numbers are called.</p>
        </div>
      </a>
    </div>
    <div class="center mt-24">
      <a href="/guide" class="pill" style="text-decoration:none; font-size:13px;">📖 How to play guide</a>
      &nbsp;
      <a href="/spectate" class="pill" style="text-decoration:none; font-size:13px;">📺 Spectate</a>
    </div>
  </div>
</body>
</html>
